# mapping_witness.yaml
# Mapping entre les colonnes du "witnesses" définies dans witness_to_tei.py
# et les éléments TEI définis dans witness.odd 


record_type: witness

tei_root:
  xml_id:
    source: Witness_H-ID
    transform: "lambda x: f'witness_{int(x)}'"

# ============================================================
# teiHeader / fileDesc / titleStmt
# ============================================================
titleStmt:
  title:
    source: Witness_preferred_siglum
    tei_path: teiHeader/fileDesc/titleStmt/title

# ============================================================
# teiHeader / profileDesc / langUsage
# ============================================================
langUsage:
  language:
    # Valeur textuelle complète (ex. "dum (Middle Dutch)")
    source: Witness_regional_writing_style Name
    tei_path: teiHeader/profileDesc/langUsage/language
    attributes:
      ident:
        source: Witness_regional_writing_style Name
        # Extraire le code ISO entre le début et l'espace
        transform: "lambda x: x.split(' ')[0] if isinstance(x, str) else None"
    children:
      - element: lang
        attributes:
          n: regional
        source: Witness_regional_writing_style Name
      - element: lang
        attributes:
          n: scripta
        source: Witness_scripta_freetext

# ============================================================
# teiHeader / profileDesc / creation
# ============================================================
creation:
  date:
    tei_path: teiHeader/profileDesc/creation/date
    source: Witness_date_of_creation
    attributes:
      certainty:
        source: Witness_date_of_creation_certainty
        # Valeurs fermées : probable, unlikely, very_likely, unknown
      source:
        source: Witness_date_of_creation_source
      when:
        source: Witness_date_of_creation
        # Extraire la valeur numérique de la date si structurée

# ============================================================
# teiHeader / sourceDesc / msDesc
# ============================================================
msDesc:
  tei_path: teiHeader/sourceDesc/msDesc
  attributes:
    type:
      source: Witness_status_witness
      # Valeurs fermées : citation, complete, defective, fragmentary, lost, unknown
      nullable_fallback: unknown

  # --- msIdentifier (niveau witness) ---
  msIdentifier:
    tei_path: teiHeader/sourceDesc/msDesc/msIdentifier
    children:
      - element: settlement
        source: Repository_city Name
        attributes:
          heurist_id:
            source: Repository_city H-ID
      - element: repository
        source: Repository_preferred_name
        attributes:
          type: preferred_name
          heurist_id:
            source: Repository_H-ID
          viaf:
            source: Repository_VIAF
      - element: repository
        source: Repository_label_name
        attributes:
          type: label_name
      - element: idno
        source: Witness_H-ID
        attributes:
          type: heurist
      - element: idno
        source: DocumentTable_current_shelfmark
        attributes:
          type: shelfmark
      - element: altIdentifier
        condition: "DocumentTable_old_shelfmark is not null"
        attributes:
          type: old-shelfmark
        children:
          - element: idno
            source: DocumentTable_old_shelfmark

  # --- note (status_notes) ---
  note:
    tei_path: teiHeader/sourceDesc/msDesc/note
    source: Witness_status_notes
    attributes:
      type: witness-status

  # ============================================================
  # msFrag (1 par Part, piloté par Part_div_order)
  # ============================================================
  msFrag:
    tei_path: teiHeader/sourceDesc/msDesc/msFrag
    # Chaque ligne du dataframe correspondant à une Part génère un msFrag
    iterate_on: Part_div_order

    # msIdentifier du fragment (document porteur)
    msIdentifier:
      children:
        - element: settlement
          source: Repository_city Name
          attributes:
            heurist_id:
              source: Repository_city H-ID
        - element: repository
          source: Repository_preferred_name
          attributes:
            type: preferred_name
            heurist_id:
              source: Repository_H-ID
        - element: idno
          source: DocumentTable_H-ID
          attributes:
            type: heurist
        - element: idno
          source: DocumentTable_current_shelfmark
          attributes:
            type: shelfmark
        - element: altIdentifier
          condition: "DocumentTable_old_shelfmark is not null"
          attributes:
            type: old-shelfmark
          children:
            - element: idno
              source: DocumentTable_old_shelfmark
        - element: collection
          source: DocumentTable_collection_of_fragments
          attributes:
            type:
              source: DocumentTable_collection_of_fragments
              # Valeurs fermées : yes, no, unknown
          children:
            - element: location
              attributes:
                known:
                  source: DocumentTable_location_known
                  # Valeurs fermées : yes, no

    # physDesc du fragment
    physDesc:
      children:
        - element: objectDesc
          children:
            - element: supportDesc
              children:
                - element: support
                  children:
                    - element: material
                      source: PhysDesc_material
                    # textNode pour la forme
                    - text:
                        source: PhysDesc_form
            - element: layoutDesc
              children:
                - element: layout
                  attributes:
                    type: columns
                  children:
                    - element: dimensions
                      attributes:
                        type: leaves
                      children:
                        - element: height
                          source: PhysDesc_folio_size_height
                          attributes:
                            unit:
                              source: PhysDesc_folio_size_reference
                            atLeast:
                              source: PhysDesc_estimated_folio_size_height
                        - element: width
                          source: PhysDesc_folio_size_width
                          attributes:
                            unit:
                              source: PhysDesc_folio_size_reference
                            atLeast:
                              source: PhysDesc_estimated_folio_size_width
                    - element: dimensions
                      attributes:
                        type: written
                      children:
                        - element: height
                          source: PhysDesc_writing_surface_area_height
                          attributes:
                            unit:
                              source: PhysDesc_writing_surface_area_reference
                        - element: width
                          source: PhysDesc_writing_surface_area_width
                          attributes:
                            unit:
                              source: PhysDesc_writing_surface_area_reference
                - element: layout
                  attributes:
                    type: writtenLines
                  source: PhysDesc_number_of_lines_in_writing_area
        - element: handDesc
          children:
            - element: handNote
              source: PhysDesc_script_type
              attributes:
                script:
                  source: PhysDesc_subscript_type
        - element: decoDesc
          children:
            - element: decoNote
              source: PhysDesc_has_decorations
              attributes:
                type:
                  source: PhysDesc_has_decorations
                  # Valeurs fermées : unknown, initials, rubrication,
                  # incomplete-dec., no-decoration, unrelated-picture

    # msContents du fragment
    msContents:
      children:
        - element: msItemStruct
          children:
            - element: locus
              attributes:
                from:
                  source: Part_page_ranges
                  transform: "lambda x: x[0] if isinstance(x, list) else x"
                to:
                  source: Part_page_ranges
                  transform: "lambda x: x[-1] if isinstance(x, list) else x"

    # additional > surrogates > bibl (digitizations)
    additional:
      children:
        - element: surrogates
          # Itère sur les digitizations associées au document
          iterate_on: Digitization_H-ID
          children:
            - element: bibl
              attributes:
                type: digitisation
              children:
                - element: idno
                  source: Digitization_H-ID
                  attributes:
                    type: heurist
                - element: ptr
                  source: Digitization_URI
                  # IIIF manifest si disponible
                  attributes:
                    target:
                      source: Digitization_URI
