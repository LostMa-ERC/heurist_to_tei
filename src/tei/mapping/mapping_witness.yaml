      - children:
          resp:
            value: "Editor of the French corpus"
          persName:
            attributes:
              xml:id: "JBC"
            children:
              forename:
                value: "Jean-Baptiste"
              surname:
                value: "Camps"
      - children:
          resp:
            value: "Data architect"
          persName:
            attributes:
              xml:id: "VR"
            children:
              forename:
                value: "Virgile"
              surname:
                value: "Reignier"
      - children:
          resp:
            value: "Data architect"
          persName:
            attributes:
              xml:id: "KC"
            children:
              forename:
                value: "Kelly"
              surname:
                value: "Christensen"
      - children:
          resp:
            value: "Data architect"
          persName:
            attributes:
              xml:id: "MM"
            children:
              forename:
                value: "Maud"
              surname:
                value: "Mélinand"
      - children:
          resp:
            value: "Research engineer"
          persName:
            attributes:
              xml:id: "TM"
            children:
              forename:
                value: "Théo"
              surname:
                value: "Moins"
      - children:
          resp:
            value: "Research engineer"
          persName:
            attributes:
              xml:id: "BH"
            children:
              forename:
                value: "Brenna"
              surname:
                value: "Hensley"
      - children:
          resp:
            value: "Research engineer"
          persName:
            attributes:
              xml:id: "UG"
            children:
              forename:
                value: "Ulysse"
              surname:
                value: "Godreau"

# ============================================================
# teiHeader / fileDesc / sourceDesc / msDesc
# ============================================================
msDesc:
  xpath: teiHeader/fileDesc/sourceDesc/msDesc
  attributes:
    type:
      source: Witness_status_witness    # valeur fermée : citation | complete | defective | fragmentary | lost | unknown
      default: "unknown"

  # --- msIdentifier (niveau witness) ---
  msIdentifier:
    xpath: msDesc/msIdentifier
    children:
      settlement:
        source: Repository_city_name
        attributes:
          heurist_id: Repository_city_H-ID
      repository:
        # deux occurrences : label_name et preferred_name
        instances:
          - attributes:
              type: "label_name"
            source: Repo_label_name
            attributes_extra:
              heurist_id: Repository_H-ID
              viaf: Repository_VIAF
          - attributes:
              type: "preferred_name"
            source: Repository_preferred_name
      idno:
        instances:
          - attributes:
              type: "heurist"
            source: Witness_H-ID
          - attributes:
              type: "shelfmark"
            source: DocumentTable_current_shelfmark
      altIdentifier:
        condition: "DocumentTable_old_shelfmark is not null"
        attributes:
          type: "old-shelfmark"
        children:
          idno:
            source: DocumentTable_old_shelfmark

  # --- msFrag (une instance par Part, répété selon Part_div_order) ---
  msFrag:
    xpath: msDesc/msFrag
    repeat_on: parts                  # itère sur les lignes de la table parts liées au witness

    msIdentifier:
      children:
        collection:
          source: DocumentTable_collection_of_fragments   # yes | no | unknown
          children:
            location:
              attributes:
                known: DocumentTable_location_known       # yes | no
        idno:
          instances:
            - attributes:
                type: "heurist"
              source: Part_H-ID
            - attributes:
                type: "shelfmark"
              source: DocumentTable_current_shelfmark

    physDesc:
      objectDesc:
        supportDesc:
          support:
            children:
              material:
                source: Part_material                    # valeur textuelle libre
        layoutDesc:
          layout:
            instances:
              - attributes:
                  type: "columns"
                source: Part_number_of_columns
              - attributes:
                  type: "writtenLines"
                source: Part_number_of_lines_in_writing_area
            dimensions:
              instances:
                - attributes:
                    type: "written"
                  children:
                    height:
                      source: Part_writing_surface_area_height
                      attributes:
                        unit: "mm"
                    width:
                      source: Part_writing_surface_area_width
                      attributes:
                        unit: "mm"
                - attributes:
                    type: "leaves"
                  children:
                    height:
                      source: Part_folio_size_height
                      attributes:
                        unit: "mm"
                    width:
                      source: Part_folio_size_width
                      attributes:
                        unit: "mm"

      handDesc:
        handNote:
          instances:
            - attributes:
                script: Part_script_type
              source: Part_script_type
            - attributes:
                script: Part_subscript_type
              source: Part_subscript_type

      decoDesc:
        decoNote:
          instances:
            - attributes:
                type: Part_has_decoration      # valeur fermée ODD
            - attributes:
                type: Part_amount_of_illustration

    msContents:
      msItemStruct:
        locus:
          attributes:
            from: Part_page_ranges_from
            to: Part_page_ranges_to
        # author et title : non mappés ici (hérités du text associé)

    additional:
      surrogates:
        bibl:
          condition: "Digitization_H-ID is not null"
          attributes:
            type: "digitisation"
          children:
            idno:
              source: Digitization_H-ID
            ptr:
              source: Digitization_URI

# ============================================================
# teiHeader / profileDesc
# ============================================================
profileDesc:
  langUsage:
    language:
      repeat_on: Witness_regional_writing_style   # peut être multiple
      attributes:
        ident: Witness_regional_writing_style_code   # code 3 lettres unicode
      children:
        lang:
          instances:
            - attributes:
                n: "regional"
              source: Witness_regional_writing_style_name
            - attributes:
                n: "scripta"
              source: Witness_scripta_freetext

  creation:
    date:
      source: Witness_date_of_creation
      attributes:
        when: Witness_date_of_creation            # valeur ISO si disponible
        certainty: Witness_date_of_creation_certainty   # probable | unlikely | very_likely | unknown
        source: Witness_date_of_creation_source

# ============================================================
# teiHeader / revisionDesc
# ============================================================
revisionDesc:
  change:
    attributes:
      who: null      # non disponible en DB — à déterminer
      when: null     # idem

# ============================================================
# Champs non mappés (à traiter ultérieurement)
# ============================================================
# - principal/persName : métadonnées Heurist non encore extraites
# - respStmt/persName  : idem
# - revisionDesc/change/@who et @when : idem
# - note/@type="witness-status" (Witness_status_note) : à ajouter si besoin