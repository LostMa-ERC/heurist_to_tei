# Mapping des champs Heurist -> éléments TEI pour les fichiers witness
# Dérivé de l'ODD witness
# Namespace TEI : http://www.tei-c.org/ns/1.0

namespaces:
  tei: "http://www.tei-c.org/ns/1.0"

# ============================================================
# RACINE TEI
# ============================================================
root:
  element: TEI
  attributes:
    xml:id:
      source: Witness_H-ID          # identifiant Heurist du witness -> @xml:id de <TEI>
      transform: "hid_{value}"      # préfixe "hid_" pour garantir un ID XML valide

# ============================================================
# teiHeader / fileDesc / titleStmt
# ============================================================
titleStmt:

  title:
    xpath: teiHeader/fileDesc/titleStmt/title
